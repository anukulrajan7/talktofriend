# CI/CD pipeline for TalkToFriend
#
# Required GitHub Secrets:
#   VPS_HOST      — VPS IP address
#   VPS_USER      — SSH username (usually root)
#   VPS_SSH_KEY   — Private SSH key
#   VPS_PORT      — SSH port (default 22)

name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Job 1: Syntax check ──────────────────────────────────────
  test:
    name: Syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Syntax check — server files
        run: node --check server/server.js server/signaling.js server/sfu.js server/db.js server/limits.js server/logger.js server/metrics.js server/words.js

      - name: Syntax check — client files
        run: node --check public/js/app-room.js public/js/chat.js public/js/media.js public/js/mesh.js public/js/reactions.js public/js/sfu-client.js public/js/signaling.js public/js/sounds.js public/js/speaking-detector.js public/sw.js

  # ── Job 2: Deploy ────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd /root/talktofriend

            # Pull latest code
            git pull origin main

            # ── 1. Rebuild and restart the app (core stack) ──
            cd deploy
            docker compose -f docker-compose.yml build
            docker compose -f docker-compose.yml up -d

            # ── 2. Restart monitoring stack (independent) ──
            docker compose -f docker-compose.monitoring.yml up -d

            # Show container status
            docker compose -f docker-compose.yml ps
            docker compose -f docker-compose.monitoring.yml ps

            # Health check — app on host port 3000 (network_mode: host)
            echo "Waiting for app to be healthy..."
            sleep 8
            curl -f http://127.0.0.1:3000/healthz || exit 1

            echo "Deploy complete."
