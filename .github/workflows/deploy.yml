# CI/CD pipeline for TalkToFriend
#
# Required GitHub Secrets:
#   VPS_HOST      — VPS IP address
#   VPS_USER      — SSH username (usually root)
#   VPS_SSH_KEY   — Private SSH key (full contents of ~/.ssh/id_rsa)
#   VPS_PORT      — SSH port (default 22)

name: Deploy

on:
  push:
    branches:
      - main
    # Skip pipeline when only docs change
    paths-ignore:
      - '**.md'
      - 'docs/**'
  # Allow triggering a deploy manually from the GitHub Actions UI
  workflow_dispatch:

# Only one deploy runs at a time. A new push cancels any in-progress deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Job 1: test ────────────────────────────────────────────────────────────
  test:
    name: Syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      # node --check parses each file for syntax errors without executing it
      - name: Syntax check — server files
        run: node --check server/server.js server/signaling.js server/sfu.js server/db.js server/limits.js server/logger.js server/metrics.js server/words.js

      - name: Syntax check — client files
        run: node --check public/js/app-index.js public/js/app-room.js public/js/chat.js public/js/media.js public/js/mesh.js public/js/reactions.js public/js/sfu-client.js public/js/signaling.js

  # ── Job 2: deploy ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test  # Only deploy if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # SSH into the VPS and run the full deploy sequence:
      #   1. Pull latest code from main
      #   2. Rebuild Docker images (no cache to pick up dependency changes)
      #   3. Restart containers
      #   4. Health check — fail the job if the app doesn't respond
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e  # Exit immediately if any command fails

            cd /opt/talktofriend

            # Pull latest code
            git pull origin main

            # Rebuild and restart containers (compose file lives in deploy/)
            cd deploy
            docker-compose build --no-cache
            docker-compose up -d

            # Show container status for the deploy log
            docker-compose ps

            # Health check — the app must respond 200 on /healthz
            echo "Waiting for app to be healthy..."
            sleep 5
            curl -f http://localhost:3000/healthz || exit 1

            echo "Deploy complete."
