# PR test pipeline for TalkToFriend
# Runs syntax checks on every pull request targeting main.
# No deploy — just validate the code is safe to merge.

name: Test

on:
  pull_request:
    branches:
      - main

jobs:
  # ── Syntax check ───────────────────────────────────────────────────────────
  test:
    name: Syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      # node --check parses each file for syntax errors without executing it
      - name: Syntax check — server files
        run: node --check server/server.js server/signaling.js server/sfu.js server/db.js server/limits.js server/logger.js server/metrics.js server/words.js

      - name: Syntax check — client files
        run: node --check public/js/app-room.js public/js/chat.js public/js/media.js public/js/mesh.js public/js/reactions.js public/js/sfu-client.js public/js/signaling.js public/js/sounds.js public/js/speaking-detector.js public/sw.js
