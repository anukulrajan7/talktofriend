# ── Observability stack (separate from app) ───────────────────
# Start independently: docker compose -f docker-compose.monitoring.yml up -d
#
# Prometheus scrapes the app at host.docker.internal:3000/metrics.
# Grafana reads from Prometheus. Uptime Kuma pings the app externally.
#
# Monitoring crash ≠ app crash. App crash ≠ monitoring crash.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: ttf-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: ttf-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GF_ROOT_URL:-http://localhost:3001}
      - GF_UNIFIED_ALERTING_ENABLED=true
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: ttf-uptime
    restart: unless-stopped
    ports:
      - "127.0.0.1:3002:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - uptime_data:/app/data
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  uptime_data:
