# ── Core application stack ────────────────────────────────────
# App only. Monitoring at /docker/ttf-monitoring/ on VPS.
# Traefik handles HTTPS (configured in /docker/traefik-pt36/).
#
# WHY network_mode: host?
#   mediasoup needs UDP ports 40000-40200. Docker port mapping creates
#   an iptables rule per port which OOMs the daemon.
#   Host networking = zero overhead, direct port access.

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ttf-app
    restart: always
    network_mode: host
    env_file:
      - ../.env
    volumes:
      - app_data:/app/data

volumes:
  app_data:
