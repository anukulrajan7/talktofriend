# ── Core application stack ────────────────────────────────────
# App + Caddy only. Monitoring is in docker-compose.monitoring.yml
#
# WHY network_mode: host?
#   mediasoup needs UDP ports 40000-49999. Docker port mapping creates
#   an iptables rule per port (20,000 rules) which OOMs the daemon.
#   Host networking = zero overhead, direct port access.

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: ttf-app
    restart: always
    network_mode: host
    env_file:
      - ../.env
    volumes:
      - app_data:/app/data

  caddy:
    image: caddy:2-alpine
    container_name: ttf-caddy
    restart: always
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      app:
        condition: service_healthy

volumes:
  caddy_data:
  app_data:
