apiVersion: 1

contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram-1
        type: telegram
        settings:
          bottoken: ${TELEGRAM_BOT_TOKEN}
          chatid: ${TELEGRAM_CHAT_ID}
          message: |
            {{ `{{ .CommonLabels.alertname }}` }}
            {{ `{{ range .Alerts }}` }}
            Status: {{ `{{ .Status }}` }}
            Summary: {{ `{{ .Annotations.summary }}` }}
            Severity: {{ `{{ .Labels.severity }}` }}
            {{ `{{ end }}` }}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: telegram
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h

groups:
  - orgId: 1
    name: TalkToFriend
    folder: TalkToFriend
    interval: 1m
    rules:
      - uid: ttf-high-error-rate
        title: High Error Rate
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: increase(ttf_errors_total[5m])
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "Error rate spike — more than 5 errors in 5 minutes"
        labels:
          severity: critical

      - uid: ttf-rate-limit-storm
        title: Rate Limit Storm
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: increase(ttf_rateLimitHits_total[5m])
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 50
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 1m
        annotations:
          summary: "Rate limiting triggered heavily — possible abuse"
        labels:
          severity: warning

      - uid: ttf-server-down
        title: Server Down
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: up{job="talktofriend"}
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: Alerting
        execErrState: Alerting
        for: 30s
        annotations:
          summary: "TalkToFriend server is DOWN"
        labels:
          severity: critical

      - uid: ttf-high-socket-count
        title: High Socket Count
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: ttf_sockets_active
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 1500
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Socket count approaching limit (1500/2000)"
        labels:
          severity: warning

      - uid: ttf-high-room-count
        title: High Room Count
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: ttf_rooms_active
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 400
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: "Room count approaching limit (400/500)"
        labels:
          severity: warning
