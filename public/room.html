<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://cdn.jsdelivr.net; media-src 'self' blob:; connect-src 'self' wss: ws: https://cdn.jsdelivr.net; worker-src 'self' blob: https://cdn.jsdelivr.net;">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="shortcut icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TalkToFriend — in call</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="/styles.css">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans:['Geist','system-ui','sans-serif'], mono:['Geist Mono','ui-monospace','monospace'] },
        colors: {
          bg:'#0a0a0f', surf:'#12121a', surf2:'#1a1a26', surf3:'#222230', line:'#2a2a3a',
          ink:'#f0f0f3', dim:'#a1a1b5', mute:'#6b6b80',
          brand:{50:'#f5f3ff',100:'#ede9fe',400:'#a78bfa',500:'#7c3aed',600:'#6d28d9'},
          amber:{400:'#fbbf24',500:'#f59e0b'}, ok:'#10b981', danger:'#ef4444',
        },
      },
    },
  };
</script>

<style>
  [x-cloak] { display: none !important; }
  body { background: #0a0a0f; }

  /* Lobby ambient */
  .lobby-bg {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 50% at 30% 30%, rgba(124, 58, 237, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 70% 70%, rgba(245, 158, 11, 0.08) 0%, transparent 60%);
    animation: meshShift 14s ease-in-out infinite alternate;
  }

  /* Name tag overlay on video tiles */
  .name-tag {
    position: absolute; bottom: 8px; left: 8px;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px; font-weight: 500;
    background: rgba(10, 10, 15, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #f0f0f3;
    z-index: 2;
  }

  video { background: #12121a; }
  .ctrl.on { background: rgba(124,58,237,0.15); border-color: rgba(124,58,237,0.5); color: #a78bfa; }

  /* ─── Unified chat panel — one DOM element, responsive positioning ─── */
  .chat-panel {
    /* Mobile: bottom-sheet overlay */
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-height: 70vh;
    transform: translateY(100%);
    transition: transform 350ms cubic-bezier(0.16, 1, 0.3, 1);
    border-radius: 20px 20px 0 0;
    z-index: 45;
    display: flex;
    flex-direction: column;
    background: rgba(18, 18, 26, 0.92);
    backdrop-filter: blur(28px) saturate(180%);
    -webkit-backdrop-filter: blur(28px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .chat-panel.open { transform: translateY(0); }
  @media (min-width: 768px) {
    .chat-panel {
      position: static;
      transform: none !important;
      width: 20rem;
      max-height: none;
      border-radius: 0;
      border: none;
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      flex-shrink: 0;
    }
    .chat-handle { display: none !important; }
  }
  @media (min-width: 1024px) {
    .chat-panel { width: 24rem; }
  }

  /* Tile hover lift */
  .tile {
    transition: transform 250ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  .tile:hover:not(.speaking) {
    transform: translateY(-2px);
  }

  /* Speaking indicator — now audio-reactive via --speak-level CSS var (set by JS) */
  /* See styles.css for the main .speaking rule driven by --speak-level */
</style>
</head>

<body class="h-[100dvh] flex flex-col overflow-hidden relative" x-data="room()" x-init="init()">

<!-- Ambient mesh bg (very subtle) -->
<div class="mesh-bg opacity-40"></div>

<!-- ─── TOP BAR ─── -->
<header class="relative z-20 flex items-center justify-between px-3 sm:px-5 py-2.5 glass-strong border-b border-white/5 shrink-0">
  <div class="flex items-center gap-3 min-w-0">
    <a href="/" class="text-mute hover:text-ink transition-colors" title="Home" data-test="home-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
    </a>
    <div class="min-w-0 flex items-center gap-2">
      <span class="w-1.5 h-1.5 rounded-full bg-brand-400 shrink-0"></span>
      <code class="font-mono text-brand-400 text-sm font-semibold truncate" x-text="code || '...'" data-test="room-code"></code>
    </div>
    <button @click="copyLink()"
            data-test="copy-link"
            class="text-xs px-2.5 py-1 rounded-lg bg-white/5 hover:bg-white/10 text-dim hover:text-ink transition-all shrink-0 cursor-pointer border border-white/5">
      <span x-text="copied ? '✓ copied' : 'copy link'"></span>
    </button>
  </div>

  <div class="flex items-center gap-2.5 text-xs" data-test="connection-status">
    <span class="w-2 h-2 rounded-full shrink-0"
          :class="connState==='ok' ? 'bg-ok' : connState==='fail' ? 'bg-danger' : 'bg-amber-500 dot-pulse'"></span>
    <span class="text-dim hidden sm:inline" x-text="statusText"></span>
    <span class="px-2 py-0.5 rounded-md bg-white/5 border border-white/5 text-mute font-mono text-[11px]" data-test="peer-count">
      <span x-text="peerCount"></span>/20
    </span>
  </div>
</header>

<!-- ─── STAGE ─── -->
<div class="flex-1 flex overflow-hidden min-h-0 relative">

  <!-- Video grid -->
  <main class="flex-1 relative p-2 sm:p-3 overflow-hidden">
    <div id="grid"
         data-test="video-grid"
         class="h-full w-full grid gap-2 sm:gap-3"
         :class="{ ['grid-' + Math.min(20, Math.max(1, peerCount))]: !pinnedPeerId, 'has-pinned': !!pinnedPeerId }"></div>

    <!-- Lobby state (alone) -->
    <template x-if="peerCount <= 1">
      <div class="absolute inset-0 flex items-center justify-center p-6" data-test="lobby">
        <div class="lobby-bg"></div>
        <div class="relative text-center max-w-sm">

          <div class="appear appear-1 text-6xl sm:text-7xl mb-5" style="animation: popIn 600ms cubic-bezier(0.16,1,0.3,1) both, dotPulse 2.4s ease-in-out 600ms infinite;">👻</div>

          <div class="appear appear-2 inline-flex items-center gap-2 px-3 py-1 rounded-full glass-light text-xs text-dim mb-4">
            <span class="connecting-dots flex items-center gap-1">
              <span></span><span></span><span></span>
            </span>
            waiting for friends
          </div>

          <h2 class="appear appear-3 text-xl sm:text-2xl font-semibold text-ink mb-1">you're first</h2>
          <p class="appear appear-3 text-dim text-sm mb-6">share the link below, up to 19 friends can join</p>

          <div class="appear appear-4 glass rounded-2xl p-3 flex items-center gap-2">
            <code class="flex-1 font-mono text-brand-400 text-sm text-left truncate pl-2" x-text="code"></code>
            <button @click="copyLink()"
                    class="px-4 py-2 rounded-lg bg-brand-500 hover:bg-brand-400 text-white text-xs font-medium transition-colors shrink-0 cursor-pointer">
              <span x-text="copied ? '✓ copied' : 'copy'"></span>
            </button>
          </div>

          <p class="appear appear-5 text-[11px] text-mute mt-4 hidden sm:block">
            <kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 font-mono text-[10px]">M</kbd> mute ·
            <kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 font-mono text-[10px]">V</kbd> camera ·
            <kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 font-mono text-[10px]">B</kbd> blur ·
            <kbd class="px-1.5 py-0.5 rounded bg-white/5 border border-white/10 font-mono text-[10px]">S</kbd> share
          </p>
        </div>
      </div>
    </template>

    <!-- Reactions overlay -->
    <div id="reactions" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
  </main>

  <!-- ─── CHAT PANEL (unified: sidebar on desktop, bottom-sheet on mobile) ─── -->
  <aside class="chat-panel" :class="{ open: chatOpen }" data-test="chat-sheet">
    <div class="chat-handle bottom-sheet-handle shrink-0" @click="chatOpen = false"></div>
    <div class="px-4 py-3 border-b border-white/5 flex items-center justify-between shrink-0">
      <div class="flex items-center gap-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-dim">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="text-sm font-medium">chat</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-[10px] text-mute uppercase tracking-wider hidden md:inline">/rain for confetti</span>
        <button @click="chatOpen = false"
                class="md:hidden text-mute hover:text-ink text-xl leading-none cursor-pointer"
                data-test="close-chat">&times;</button>
      </div>
    </div>
    <div id="chatList" class="flex-1 overflow-y-auto p-3 space-y-2.5 text-sm min-h-[200px]"></div>
    <form @submit.prevent="sendChat()" class="p-3 border-t border-white/5 flex gap-2 shrink-0">
      <input x-model="chatInput"
             data-test="chat-input"
             type="text"
             maxlength="500"
             placeholder="/rain for confetti…"
             class="flex-1 px-3 py-2 rounded-xl bg-white/5 border border-white/8 text-sm outline-none focus:border-brand-400 focus:bg-white/8 placeholder:text-mute min-w-0 transition-all">
      <button type="submit"
              data-test="send-chat"
              class="px-4 py-2 rounded-xl bg-brand-500 hover:bg-brand-400 text-white text-xs font-medium transition-colors cursor-pointer shrink-0">
        send
      </button>
    </form>
  </aside>

</div>

<!-- ─── FLOATING PILL CONTROL BAR ─── -->
<footer class="fixed bottom-4 sm:bottom-6 left-1/2 -translate-x-1/2 z-40 transition-opacity duration-500"
        :class="controlsVisible ? 'opacity-100' : 'opacity-0 pointer-events-none hover:opacity-100 hover:pointer-events-auto'"
        @mouseenter="controlsVisible = true"
        data-test="controls">
  <div class="glass-strong rounded-full px-3 sm:px-4 py-2.5 sm:py-3 flex items-center gap-1.5 sm:gap-2 shadow-dramatic border border-white/10"
       @mouseenter.passive="sounds?.hover()" @mousedown.passive="sounds?.click()"
  >

    <button @click="toggleMute()"
            data-test="toggle-mic"
            class="ctrl"
            :class="{ off: micMuted }"
            :title="micMuted ? 'Unmute (M)' : 'Mute (M)'">
      <svg x-show="!micMuted" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
      </svg>
      <svg x-show="micMuted" x-cloak width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V5a3 3 0 0 0-5.94-.6"/>
        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .46-.04.9-.11 1.33"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
      </svg>
    </button>

    <button @click="toggleCam()"
            data-test="toggle-cam"
            class="ctrl"
            :class="{ off: camOff }"
            :title="camOff ? 'Camera on (V)' : 'Camera off (V)'">
      <svg x-show="!camOff" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="23 7 16 12 23 17 23 7"/>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      <svg x-show="camOff" x-cloak width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
      </svg>
    </button>

    <button @click="toggleBlur()"
            data-test="toggle-blur"
            class="ctrl hidden sm:inline-flex"
            :class="{ on: blurEnabled }"
            :title="blurEnabled ? 'Blur off (B)' : 'Blur on (B)'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" opacity="0.3"/>
        <circle cx="12" cy="8" r="3"/>
        <path d="M6.5 18C6.5 14.5 8.5 12 12 12s5.5 2.5 5.5 6"/>
      </svg>
    </button>

    <button @click="toggleShare()"
            data-test="toggle-share"
            class="ctrl hidden sm:inline-flex"
            :class="{ off: sharing }"
            title="Screen share (S)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </button>

    <!-- Reactions -->
    <div class="relative" x-data="{ open:false }" @click.outside="open=false">
      <button @click="open = !open"
              data-test="toggle-reactions"
              class="ctrl"
              title="React">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
          <line x1="9" y1="9" x2="9.01" y2="9"/>
          <line x1="15" y1="9" x2="15.01" y2="9"/>
        </svg>
      </button>
      <div x-show="open"
           x-transition
           x-cloak
           data-test="reactions-popup"
           class="absolute bottom-16 left-1/2 -translate-x-1/2 glass rounded-2xl p-2 flex gap-1 shadow-2xl z-50 border border-white/10">
        <template x-for="e in ['🎉','👏','❤️','😂','🔥','👍','💡','👀']" :key="e">
          <button @click="$dispatch('react', e); open = false"
                  class="text-xl sm:text-2xl hover:scale-125 hover:bg-white/5 rounded-lg transition-all p-1.5 cursor-pointer"
                  x-text="e"></button>
        </template>
      </div>
    </div>

    <!-- Chat toggle (mobile) -->
    <button @click="chatOpen = !chatOpen; unread = 0"
            data-test="toggle-chat"
            class="ctrl md:hidden relative"
            title="Chat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <span x-show="unread > 0"
            x-cloak
            class="absolute -top-1 -right-1 min-w-[16px] h-4 px-1 rounded-full bg-danger text-[10px] font-bold flex items-center justify-center"
            x-text="unread"></span>
    </button>

    <!-- Settings -->
    <div class="relative" x-data="{ sOpen: false }" @click.outside="sOpen = false">
      <button @click="sOpen = !sOpen" class="ctrl" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
      <div x-show="sOpen" x-transition x-cloak
           class="absolute bottom-16 right-0 glass-strong rounded-2xl p-3 shadow-2xl z-50 border border-white/10 min-w-[180px] space-y-2">
        <div class="text-[11px] text-mute uppercase tracking-wider mb-1">quality</div>
        <template x-for="q in ['480p', '720p', '1080p']" :key="q">
          <button @click="switchQuality(q); sOpen = false"
                  class="w-full text-left px-3 py-1.5 rounded-lg text-sm transition-all cursor-pointer"
                  :class="videoQuality === q ? 'bg-brand-500/20 text-brand-400 font-medium' : 'text-dim hover:bg-white/5 hover:text-ink'"
                  x-text="q + (q === '720p' ? ' (default)' : q === '1080p' ? ' (HD)' : ' (low)')">
          </button>
        </template>
      </div>
    </div>

    <div class="w-px h-7 bg-white/10 mx-1"></div>

    <button @click="leave()"
            data-test="leave-call"
            class="ctrl end"
            title="End call">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="rotate(135)">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </button>
  </div>
</footer>

<!-- ─── DEBUG PANEL (visible in dev mode or ?debug=1) ─── -->
<div x-show="showDebug" x-cloak
     class="fixed top-14 right-2 z-50 bg-black/90 text-green-400 font-mono text-[10px] p-2 rounded-lg max-w-xs overflow-auto max-h-60 border border-green-900"
     x-data="{ collapsed: false }">
  <div class="flex justify-between items-center mb-1">
    <span class="text-green-300 font-bold">DEBUG</span>
    <button @click="collapsed = !collapsed" class="text-green-600 cursor-pointer" x-text="collapsed ? '+' : '-'"></button>
  </div>
  <div x-show="!collapsed">
    <div>socket: <span x-text="myId ? myId.slice(0,10) : 'none'" class="text-yellow-400"></span></div>
    <div>room: <span x-text="code || 'none'" class="text-yellow-400"></span></div>
    <div>mode: <span x-text="roomMode" class="text-yellow-400"></span></div>
    <div>peers: <span x-text="peerCount" class="text-yellow-400"></span></div>
    <div>conn: <span x-text="connState" class="text-yellow-400"></span></div>
    <div>mesh: <span x-text="mesh ? 'yes (peers=' + mesh.peers.size + ')' : 'no'" class="text-yellow-400"></span></div>
    <div>localStream: <span x-text="media?.localStream ? media.localStream.getTracks().length + ' tracks' : 'none'" class="text-yellow-400"></span></div>
    <div>tiles: <span x-text="document.querySelectorAll('#grid [data-peer-id]').length" class="text-yellow-400"></span></div>
    <template x-if="mesh && mesh.peers.size > 0">
      <div class="mt-1 border-t border-green-900 pt-1">
        <template x-for="[id, entry] of mesh.peers" :key="id">
          <div class="truncate">
            <span x-text="id.slice(0,8)" class="text-blue-400"></span>:
            <span x-text="entry.pc?.iceConnectionState || 'no-pc'" class="text-yellow-400"></span>
            <span x-text="entry.remoteStream ? '(stream:' + entry.remoteStream.getTracks().length + ')' : '(no-stream)'" class="text-gray-500"></span>
          </div>
        </template>
      </div>
    </template>
  </div>
</div>

<!-- ─── TOAST ─── -->
<div x-show="toast"
     x-transition
     x-cloak
     data-test="toast"
     class="fixed bottom-24 left-1/2 -translate-x-1/2 glass-strong rounded-xl px-4 py-2 text-sm shadow-2xl z-50 toast-in whitespace-nowrap border border-white/10"
     x-text="toast"></div>

<!-- ─── FATAL ERROR OVERLAY ─── -->
<div x-show="overlay.show"
     x-transition
     x-cloak
     data-test="overlay"
     class="fixed inset-0 bg-bg/90 backdrop-blur-sm flex items-center justify-center z-50 p-6">
  <div class="glass-strong rounded-2xl p-7 sm:p-8 max-w-sm w-full text-center space-y-3 border border-white/10 pop-in">
    <div class="text-5xl" x-text="overlay.emoji"></div>
    <h2 class="text-lg font-semibold" x-text="overlay.title"></h2>
    <p class="text-dim text-sm" x-text="overlay.body"></p>
    <a href="/" class="inline-block px-5 py-2.5 rounded-xl bg-brand-500 hover:bg-brand-400 text-white text-sm font-medium transition-colors">
      go home
    </a>
  </div>
</div>
